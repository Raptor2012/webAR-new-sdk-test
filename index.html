<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>onVR Warehouse Template</title>
  <style>
    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #onvr-webar-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
      display: none;
      z-index: 0;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: transparent !important;
    }

    #unity-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent !important;
      outline: none;
    }

    #loading-cover {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050708;
      z-index: 3;
    }

    #unity-loading-bar {
      width: min(72vw, 460px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      padding: 2px;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #fff;
    }

    .spinner,
    .spinner:after {
      width: 56px;
      height: 56px;
      border-radius: 50%;
    }

    .spinner {
      border: 7px solid rgba(255, 255, 255, 0.22);
      border-left-color: #fff;
      animation: onvr-spinner 1.1s infinite linear;
    }

    @keyframes onvr-spinner {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <video id="onvr-webar-video" autoplay muted playsinline></video>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <div id="loading-cover">
    <div id="unity-loading-bar">
      <div class="spinner"></div>
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    window.OnVRWebARBridge = window.OnVRWebARBridge || (function() {
      const bridge = {
        receiverName: null,
        stream: null,
        facingMode: "environment",
        video: document.getElementById("onvr-webar-video"),

        setUnityReceiver(receiverName) {
          this.receiverName = receiverName;
        },

        isSupported() {
          const secure = location.protocol === "https:" ||
            location.hostname === "localhost" ||
            location.hostname === "127.0.0.1";
          return secure && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        },

        checkCapability() {
          this.send("OnWebARCapability", this.isSupported() ? "supported" : "unsupported");
          this.notifyViewport();
        },

        requestStart() {
          if (!this.isSupported()) {
            this.send("OnWebARCapability", "unsupported");
            return;
          }

          this.ensureVideo();
          navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: this.facingMode },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            }
          }).then((stream) => {
            this.attachStream(stream);
          }).catch((error) => {
            const name = error && error.name ? error.name : "";
            if (name === "NotAllowedError" || name === "PermissionDeniedError") {
              this.send("OnWebARPermissionDenied", "Camera permission was denied. Enable camera access in Safari settings and try again.");
            } else {
              this.send("OnWebARError", error && error.message ? error.message : "Camera failed to start.");
            }
          });
        },

        stopCamera() {
          this.stopTracksOnly();
          if (this.video) {
            this.video.pause();
            this.video.srcObject = null;
            this.video.style.display = "none";
          }
          this.send("OnWebARStopped", "Camera stopped.");
        },

        switchCamera() {
          this.facingMode = this.facingMode === "environment" ? "user" : "environment";
          this.stopTracksOnly();
          this.requestStart();
        },

        attachStream(stream) {
          this.stopTracksOnly();
          this.stream = stream;
          this.ensureVideo();
          this.video.srcObject = stream;
          this.video.style.display = "block";
          this.video.style.visibility = "visible";
          this.video.style.opacity = "1";

          const track = stream.getVideoTracks()[0];
          const settings = track && track.getSettings ? track.getSettings() : null;
          if (settings && settings.facingMode) {
            this.facingMode = settings.facingMode;
          }

          const playPromise = this.video.play();
          if (playPromise && playPromise.catch) {
            playPromise
              .then(() => this.notifyCameraReady())
              .catch((error) => {
                this.send("OnWebARError", error && error.message ? error.message : "Camera video failed to play.");
              });
          } else {
            this.notifyCameraReady();
          }
        },

        notifyCameraReady() {
          this.send("OnWebARCameraReady", this.facingMode);
          this.notifyViewport();
        },

        stopTracksOnly() {
          if (!this.stream) {
            return;
          }

          this.stream.getTracks().forEach((track) => track.stop());
          this.stream = null;
        },

        ensureVideo() {
          if (!this.video) {
            this.video = document.getElementById("onvr-webar-video");
          }

          if (!this.video) {
            this.video = document.createElement("video");
            this.video.id = "onvr-webar-video";
            document.body.insertBefore(this.video, document.body.firstChild);
          }

          this.video.setAttribute("autoplay", "");
          this.video.setAttribute("muted", "");
          this.video.setAttribute("playsinline", "");
          this.video.muted = true;
          this.video.playsInline = true;
          Object.assign(this.video.style, {
            position: "fixed",
            inset: "0",
            width: "100vw",
            height: "100vh",
            objectFit: "cover",
            background: "#000",
            display: "block",
            visibility: "visible",
            opacity: "1",
            zIndex: "0"
          });
        },

        notifyViewport() {
          const orientation = screen.orientation && screen.orientation.type
            ? screen.orientation.type
            : String(window.orientation || 0);
          this.send("OnWebARViewportChanged", `${window.innerWidth}|${window.innerHeight}|${orientation}`);
        },

        send(methodName, payload) {
          if (!this.receiverName) {
            console.warn("OnVR WebAR callback skipped: Unity receiver is not registered.", methodName);
            return;
          }

          if (typeof SendMessage === "function") {
            SendMessage(this.receiverName, methodName, payload || "");
            return;
          }

          if (window.uarGameInstance && typeof window.uarGameInstance.SendMessage === "function") {
            window.uarGameInstance.SendMessage(this.receiverName, methodName, payload || "");
            return;
          }

          console.warn("OnVR WebAR callback skipped: Unity SendMessage is not available.", methodName);
        }
      };

      window.addEventListener("resize", () => bridge.notifyViewport());
      window.addEventListener("orientationchange", () => {
        window.setTimeout(() => bridge.notifyViewport(), 250);
      });

      return bridge;
    })();
  </script>

  <script>
    (function forceTransparentUnityCanvas() {
      const originalGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, attributes) {
        if (this.id === "unity-canvas" && (type === "webgl" || type === "webgl2" || type === "experimental-webgl")) {
          attributes = Object.assign({}, attributes || {}, {
            alpha: true,
            premultipliedAlpha: false
          });
        }

        return originalGetContext.call(this, type, attributes);
      };
    })();
  </script>

  <script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/onvrWebARBuild.loader.js";
    const config = {
      dataUrl: buildUrl + "/onvrWebARBuild.data.unityweb",
      frameworkUrl: buildUrl + "/onvrWebARBuild.framework.js.unityweb",
      codeUrl: buildUrl + "/onvrWebARBuild.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "onVR Warehouse Template",
      productVersion: "0.1.0",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      webglContextAttributes: {
        alpha: true,
        premultipliedAlpha: false,
        preserveDrawingBuffer: false
      },
      cacheControl: function(url) {
        if (url.match(/\.(data|bundle|wasm|js|symbols\.json)$/)) {
          return "immutable";
        }
        return "no-store";
      },
    };

    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector(".spinner");

    const loaderScript = document.createElement("script");
    loaderScript.src = loaderUrl;
    loaderScript.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        window.uarGameInstance = unityInstance;
        loadingCover.style.display = "none";
        window.OnVRWebARBridge.checkCapability();
      }).catch((message) => {
        loadingCover.style.display = "none";
        alert(message);
      });
    };
    document.body.appendChild(loaderScript);
  </script>
</body>
</html>
