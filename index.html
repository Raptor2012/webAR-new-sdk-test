<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>onVR Spatial WebAR</title>
  <style>
    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #onvr-spatial-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
      display: none;
      z-index: 0;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent !important;
      z-index: 1;
    }

    #unity-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: transparent !important;
      outline: none;
      mix-blend-mode: screen;
    }

    body.onvr-video-front #onvr-spatial-video {
      z-index: 2;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0.92;
    }

    body.onvr-video-front #unity-container {
      z-index: 1;
    }

    #loading-cover {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050607;
      z-index: 3;
      transition: opacity 180ms ease;
    }

    #unity-loading-bar {
      width: min(70vw, 460px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      padding: 2px;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #fff;
    }

    .spinner,
    .spinner:after {
      width: 56px;
      height: 56px;
      border-radius: 50%;
    }

    .spinner {
      border: 7px solid rgba(255, 255, 255, 0.22);
      border-left-color: #fff;
      animation: onvr-spinner 1.1s infinite linear;
    }

    @keyframes onvr-spinner {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <video id="onvr-spatial-video" autoplay muted playsinline></video>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <div id="loading-cover">
    <div id="unity-loading-bar">
      <div class="spinner"></div>
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script src="OnVRSpatialTracker.js"></script>
  <script>
    (function forceTransparentUnityCanvas() {
      function patchClearColor(contextType) {
        if (!contextType || !contextType.prototype || contextType.prototype.__onvrClearColorPatched) {
          return;
        }

        const originalClearColor = contextType.prototype.clearColor;
        contextType.prototype.clearColor = function(r, g, b, a) {
          if (r === 0 && g === 0 && b === 0 && a >= 0.999) {
            a = 0;
          }
          return originalClearColor.call(this, r, g, b, a);
        };
        contextType.prototype.__onvrClearColorPatched = true;
      }

      patchClearColor(window.WebGLRenderingContext);
      patchClearColor(window.WebGL2RenderingContext);

      const originalGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, attributes) {
        if (this.id === "unity-canvas" && (type === "webgl" || type === "webgl2" || type === "experimental-webgl")) {
          attributes = Object.assign({}, attributes || {}, {
            alpha: true,
            premultipliedAlpha: false,
            preserveDrawingBuffer: false
          });
        }
        return originalGetContext.call(this, type, attributes);
      };

      window.OnVRSpatialShowCameraInFront = function(enabled) {
        document.body.classList.toggle("onvr-video-front", enabled !== false);
      };

      window.OnVRSpatialDetectOpaqueCanvas = function() {
        const canvas = document.getElementById("unity-canvas");
        const video = document.getElementById("onvr-spatial-video");
        if (!canvas || !video || video.readyState < 2 || video.style.display === "none") {
          return false;
        }

        try {
          const probe = document.createElement("canvas");
          probe.width = 4;
          probe.height = 4;
          const ctx = probe.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(canvas, 0, 0, 4, 4);
          const data = ctx.getImageData(0, 0, 4, 4).data;
          let blackOpaque = 0;
          for (let i = 0; i < data.length; i += 4) {
            if (data[i] < 8 && data[i + 1] < 8 && data[i + 2] < 8 && data[i + 3] > 240) {
              blackOpaque++;
            }
          }

          if (blackOpaque >= 12) {
            window.OnVRSpatialShowCameraInFront(true);
            return true;
          }
        } catch (error) {
          console.warn("onVR Spatial opaque canvas probe failed.", error);
        }

        return false;
      };
    })();
  </script>

  <script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/onvrSpatialWebARBuild.loader.js";
    const config = {
      dataUrl: buildUrl + "/onvrSpatialWebARBuild.data.unityweb",
      frameworkUrl: buildUrl + "/onvrSpatialWebARBuild.framework.js.unityweb",
      codeUrl: buildUrl + "/onvrSpatialWebARBuild.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "onVR Spatial WebAR",
      productVersion: "0.1.0",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: 1,
      webglContextAttributes: {
        alpha: true,
        premultipliedAlpha: false,
        preserveDrawingBuffer: false
      },
      cacheControl: function(url) {
        if (url.match(/\.(data|bundle|wasm|js|symbols\.json)$/)) {
          return "immutable";
        }
        return "no-store";
      },
    };

    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector(".spinner");

    const loaderScript = document.createElement("script");
    loaderScript.src = loaderUrl;
    loaderScript.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then((unityInstance) => {
        window.uarGameInstance = unityInstance;
        loadingCover.style.opacity = "0";
        setTimeout(() => { loadingCover.style.display = "none"; }, 200);
        setTimeout(() => window.OnVRSpatialDetectOpaqueCanvas && window.OnVRSpatialDetectOpaqueCanvas(), 2500);
        setTimeout(() => window.OnVRSpatialDetectOpaqueCanvas && window.OnVRSpatialDetectOpaqueCanvas(), 5000);
      }).catch((message) => {
        loadingCover.style.display = "none";
        alert(message);
      });
    };
    document.body.appendChild(loaderScript);
  </script>
</body>
</html>
